name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Lint
      run: bun run lint
      continue-on-error: true # In case lint script is not defined yet

    - name: Type check
      run: bunx tsc --noEmit

    - name: Build
      run: bun run build
      env:
        NODE_ENV: production
